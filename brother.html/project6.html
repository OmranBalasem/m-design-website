<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ديكور مزرعه | محمد بلاسم</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
      }

      :root {
        --bg: #f4f1ea;
        --card: #ffffff;
        --text: #2f2f2f;
        --gold: #b08d57;
        --olive: #6e7b61;
      }

      body {
        background: var(--bg);
        color: var(--text);
      }

      header {
        padding: 25px;
        text-align: center;
        background: white;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
      }

      header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 40px;
      }

      .back-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 25px;
        background: var(--olive);
        color: white;
        text-decoration: none;
        border-radius: 30px;
        transition: 0.3s;
      }

      .back-btn:hover {
        background: var(--gold);
      }

      .project-container {
        max-width: 1100px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .swiper {
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      }

      .swiper img {
        width: 100%;
        height: 500px;
        object-fit: cover;
      }

      .description {
        margin-top: 40px;
        background: var(--card);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        line-height: 2;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>ديكور مزرعه</h1>
      <a href="index.html" class="back-btn">⬅ الرجوع للرئيسية</a>
    </header>

    <div class="project-container">
      <div class="swiper projectSwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img
              src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4?q=80&w=2070"
            />
          </div>
           <div class="swiper-slide">
            <img
              src="https://images.unsplash.com/photo-1623195372033-cef888fd5a42?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fGZhcm1ob3VzZSUyMGludGVyaW9yfGVufDB8fDB8fHww"
            />
          </div>


          <div class="swiper-slide">
            <img
              src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4?q=80&w=2070"
"
            />
          </div>

          <div class="swiper-slide">
            <img
              src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=2070"
            />
          </div>
        </div>
      </div>

      <div class="description">
        تنفيذ مزرعة بطابع حديث يجمع بين البساطة والعملية،
تنسيق مساحات خارجية وجلسات حجرية فاخرة.
المساحة: 900 م² — مدة التنفيذ: 7 أشهر.
             </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      var swiper = new Swiper(".projectSwiper", {
        loop: true,
        autoplay: { delay: 2500 },
        speed: 1000,
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فيلا مودرن | محمد بلاسم</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
      }

      :root {
        --bg: #f4f1ea;
        --card: #ffffff;
        --text: #2f2f2f;
        --gold: #b08d57;
        --olive: #6e7b61;
      }

      body {
        background: var(--bg);
        color: var(--text);
      }

      header {
        padding: 25px;
        text-align: center;
        background: white;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
      }

      header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 40px;
      }

      .back-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 25px;
        background: var(--olive);
        color: white;
        text-decoration: none;
        border-radius: 30px;
        transition: 0.3s;
      }

      .back-btn:hover {
        background: var(--gold);
      }

      .project-container {
        max-width: 1100px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .swiper {
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      }

      .swiper img {
        width: 100%;
        height: 500px;
        object-fit: cover;
      }

      .description {
        margin-top: 40px;
        background: var(--card);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        line-height: 2;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>فيلا مودرن</h1>
      <a href="index.html" class="back-btn">⬅ الرجوع للرئيسية</a>
    </header>

    <div class="project-container">
      <div class="swiper projectSwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img
              src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=2070"
            />
          </div>

          <div class="swiper-slide">
            <img
              src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2070"
            />
          </div>

          <div class="swiper-slide">
            <img
              src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e?q=80&w=2070"
            />
          </div>
        </div>
      </div>

      <div class="description">
        تم تنفيذ هذه الفيلا بأسلوب مودرن فاخر يجمع بين البساطة والرقي، مع
        استخدام خامات عالية الجودة وإضاءة مدروسة تعكس فخامة المكان. تم التركيز
        على المساحات المفتوحة والتفاصيل الدقيقة في الأسقف والجدران.
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      var swiper = new Swiper(".projectSwiper", {
        loop: true,
        autoplay: { delay: 2500 },
        speed: 1000,
      });
    </script>
  </body>
</html>
